<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise for Jomana ❤️</title>
    <style>
        body { background: #0f0c29; color: white; font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; }
        .hidden { display: none; }
        .container { padding: 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #24243e, #0f0c29); }
        h1 { font-size: 3rem; color: #ff416c; text-shadow: 0 0 15px rgba(255, 65, 108, 0.7); }
        input { padding: 12px; border-radius: 25px; border: 2px solid #ff416c; width: 80%; max-width: 300px; text-align: center; background: rgba(255,255,255,0.1); color: white; outline: none; }
        button { background: linear-gradient(45deg, #ff416c, #ff4b2b); color: white; border: none; padding: 12px 30px; border-radius: 25px; margin-top: 20px; cursor: pointer; font-size: 1.1rem; }
        
        /* تصميم القلب والمشغل */
        #music-section { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid #ff416c; margin: 20px; }
        .big-heart { font-size: 80px; animation: pulse 1.5s infinite; display: block; }
        audio { margin-top: 15px; width: 100%; max-width: 250px; height: 35px; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .counter { font-size: 1.3rem; color: #ffeb3b; margin: 20px 0; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; width: 85%; display: inline-block; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin: 15px auto; }
        .flip-card { background: linear-gradient(135deg, #ff416c, #ff4b2b); padding: 15px 5px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .photo-card { margin: 20px auto; width: 85%; max-width: 350px; border: 8px solid #fff; border-radius: 10px; background: #fff; color: #333; overflow: hidden; }
        .photo-card img { width: 100%; display: block; }
        video { width: 100%; display: block; background: #000; }
        .heart-particle { position: fixed; top: -10%; font-size: 20px; z-index: 50; animation: fallAnimation linear forwards; }
        @keyframes fallAnimation { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login" class="container">
        <h1>Jomana</h1>
        <p>اكتبي كلمة السر يا قمر ❤️</p>
        <input type="text" id="pass" placeholder="كلمة السر هنا...">
        <button onclick="checkPass()">دخول ✨</button>
    </div>

    <div id="content" class="hidden" style="padding-bottom: 50px;">
        <div id="music-section">
            <span class="big-heart">❤️</span>
            <p style="color: #ffeb3b; font-weight: bold;">شغلي الأغنية من هنا ياروحي 👇</p>
            <audio id="bgMusic" controls playsinline>
                <source src="https://files.catbox.moe/wuxvic.mp3" type="audio/mpeg">
                متصفحك لا يدعم الصوت، جربي Chrome
            </audio>
            <br>
            <button onclick="showSurprise()" style="padding: 8px 20px; font-size: 0.9rem;">بعد ما تشغليها دوسي هنا ✨</button>
        </div>

        <div id="main-surprise" class="hidden">
            <h2 style="color: #ff416c;">بداية عمري معاكي ❤️</h2>
            <div class="counter" id="timer">بيعد...</div>
            
            <p style="font-weight: bold;">دوسي على القلوب 👇</p>
            <div class="card-grid">
                <div class="flip-card" onclick="this.innerHTML='اقفي هنا استني'">❤️ 1</div>
                <div class="flip-card" onclick="this.innerHTML='بحبك'">❤️ 2</div>
                <div class="flip-card" onclick="this.innerHTML='بموت فيكي'">❤️ 3</div>
                <div class="flip-card" onclick="this.innerHTML='بعشقك'">❤️ 4</div>
            </div>

            <p style="margin-top: 40px; font-weight: bold;">صورنا وأخيراً نورتيني ❤️</p>
            <div class="photo-card"><img src="https://i.ibb.co/677gP0Nf/IMG-20260404-032335-039.jpg"></div>
            <div class="photo-card"><img src="https://i.ibb.co/wZ2hMKJX/IMG-20260404-010840-644.jpg"></div>
            <div class="photo-card"><img src="https://i.ibb.co/27YnzV1d/Whats-App-Image-2026-04-15-at-4-22-48-PM.jpg"><p>ايدي ف ايدك دايما ♥️😘</p></div>
            
            <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 30px 0;">
            
            <div class="photo-card">
                <video controls playsinline preload="auto">
                    <source src="old.mp4" type="video/mp4">
                </video>
                <p>أحلى ذكرى لينا ❤️</p>
            </div>

            <div class="photo-card">
                <video controls playsinline preload="auto">
                    <source src="vid1.mp4" type="video/mp4">
                </video>
                <p>فيديو مفاجأة 1 ❤️</p>
            </div>

            <button onclick="showMessage()">دوس هنا 💌</button>
        </div>
    </div>

    <script>
        function checkPass() {
            if(document.getElementById('pass').value === 'بحبك') {
                document.getElementById('login').style.display = 'none';
                document.getElementById('content').classList.remove('hidden');
            } else { alert('كلمة السر غلط يا روحي!'); }
        }

        function showSurprise() {
            document.getElementById('main-surprise').classList.remove('hidden');
            startTimer(); 
            startHearts();
        }

        function startHearts() {
            const hearts = ['❤️', '💖', '✨'];
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000); 
            }, 300);
        }

        function startTimer() {
            const startDate = new Date("March 24, 2026 06:00:00").getTime();
            setInterval(function() {
                const now = new Date().getTime();
                const diff = now - startDate;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("timer").innerHTML = days + " يوم و " + hours + " ساعة";
            }, 1000);
        }

        function showMessage() { 
            alert('جومانه ربنا يخليكي ليا وميحرمنيش منك ابدا يروح قلبي ❤️'); 
        }
    </script>
</body>
</html>
